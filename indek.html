<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
    transition:1s;
}

.card{
    background:#fff;
    padding:35px;
    border-radius:20px;
    text-align:center;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    animation:muncul 1s;
}

h1{
    color:#ff3b6b;
}

p{
    margin:15px 0;
    color:#555;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff3b6b;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

@keyframes muncul{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.heart{
    position:absolute;
    color:red;
    font-size:24px;
    animation:jatuh 5s linear infinite;
}

@keyframes jatuh{
    0%{
        transform:translateY(-100vh) rotate(0deg);
    }
    100%{
        transform:translateY(100vh) rotate(360deg);
    }
}

.surprise{
    display:none;
    text-align:center;
    color:white;
    animation:zoom 1s;
}

.surprise h1{
    font-size:55px;
    color:#fff;
}

.surprise p{
    color:white;
    font-size:22px;
}

@keyframes zoom{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>

</head>
<body>

<div class="card" id="card">
    <h1>😊 Hai!</h1>
    <p>Klik tombol di bawah ya...</p>
    <button onclick="mulai()">Klik Aku ❤️</button>
</div>

<div class="surprise" id="surprise">
    <h1>🎉 Selamat! 🎉</h1>
    <p>Semoga harimu selalu penuh kebahagiaan 😊</p>
    <p>❤️ Tetap semangat dan jangan lupa tersenyum ❤️</p>
    <p>smileeeee</p>>
</div>

<script>

function mulai(){

    alert("✨ Kamu adalah orang yang luar biasa! 😊");

    document.body.style.background="linear-gradient(135deg,#00c9ff,#92fe9d)";

    document.getElementById("card").style.display="none";
    document.getElementById("surprise").style.display="block";

    for(let i=0;i<70;i++){
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML=Math.random()>0.5?"❤️":"💖";
        heart.style.left=Math.random()*100+"vw";
        heart.style.animationDuration=(3+Math.random()*4)+"s";
        heart.style.fontSize=(20+Math.random()*30)+"px";
        document.body.appendChild(heart);
    }

    for(let i=0;i<120;i++){
        let conf=document.createElement("div");
        conf.innerHTML="🎉";
        conf.style.position="absolute";
        conf.style.left=Math.random()*100+"vw";
        conf.style.top="-30px";
        conf.style.fontSize=(15+Math.random()*20)+"px";
        conf.style.animation=`jatuh ${2+Math.random()*3}s linear infinite`;
        document.body.appendChild(conf);
    }

}

</script>

</body>
</html>
